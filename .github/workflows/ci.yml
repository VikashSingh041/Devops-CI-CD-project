name: Node.js CI Pipeline

on:
  push    branches:
      - main

  pull_request:
    branches:
      - main


jobs:

  build:

    runs-on: ubuntu-latest


    steps:

    - name: Checkout Code
      uses: actions/checkout@v4


    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24


    - name: Install Dependencies
      run: |
        cd app
        npm install


    - name: Build Docker Image
  run: |
    docker build -t devops-app .


    - name: Build Docker Image
      run: |
        docker build -t devops-app .
